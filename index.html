<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Stars</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div>
            <p class="eyebrow">CSEN 161 Project</p>
            <h1>Media Stars</h1>
            <p>Browse movies, TV shows, and books. Add ratings and see the average score.</p>
        </div>
    </header>

    <main>
        <section class="panel add-section" aria-labelledby="add-heading">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Add media</p>
                    <h2 id="add-heading">Add something new</h2>
                </div>
                <p class="hint">All fields are checked again by PHP before saving.</p>
            </div>

            <form id="add-form" novalidate>
                <label>
                    Type
                    <select id="type" name="type">
                        <option value="movie">Movie</option>
                        <option value="tv">TV Show</option>
                        <option value="book">Book</option>
                    </select>
                </label>

                <label>
                    Title
                    <input type="text" id="title" name="title" maxlength="80" autocomplete="off">
                </label>

                <label>
                    Year
                    <input type="number" id="year" name="year" min="1000" max="2100">
                </label>

                <label id="length-label">
                    <span>Length (minutes)</span>
                    <input type="number" id="length" name="length" min="1" max="600">
                </label>

                <label id="seasons-label" class="hidden">
                    <span>Number of seasons</span>
                    <input type="number" id="seasons" name="seasons" min="1" max="100">
                </label>

                <label id="pages-label" class="hidden">
                    <span>Pages</span>
                    <input type="number" id="pages" name="pages" min="1" max="10000">
                </label>

                <label>
                    Genre
                    <input type="text" id="genre" name="genre" maxlength="40" autocomplete="off">
                </label>

                <label class="rating-label">
                    Your rating
                    <span class="range-row">
                        <input type="range" id="rating" name="rating" min="1" max="5" value="3">
                        <strong id="rating-output">3</strong>
                    </span>
                </label>

                <label>
                    <span id="image-text">Poster URL</span>
                    <input type="url" id="image_url" name="image_url" placeholder="https://...">
                </label>

                <p id="form-error" class="error-msg" role="alert"></p>

                <button type="submit" class="primary-btn">Add to library</button>
            </form>
        </section>

        <section class="panel catalog-section" aria-labelledby="catalog-heading">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Browse</p>
                    <h2 id="catalog-heading">Your library</h2>
                </div>
                <p id="item-count" class="hint">Loading...</p>
            </div>

            <div class="filter-tabs" aria-label="Filter media by type">
                <button type="button" class="tab active" data-filter="all">All</button>
                <button type="button" class="tab" data-filter="movie">Movies</button>
                <button type="button" class="tab" data-filter="tv">TV Shows</button>
                <button type="button" class="tab" data-filter="book">Books</button>
            </div>

            <div id="catalog" class="catalog-grid"></div>
            <p id="empty-msg" class="empty-msg hidden">Nothing here yet. Add something above!</p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
